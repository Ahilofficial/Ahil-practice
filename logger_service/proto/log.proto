syntax="proto3";
package log;

service LoggerService{
    rpc SaveLog(logRequest)returns (logResponse);
}

message logRequest{
    string serv`ice = 1;
    string method = 2;
    string endpoint = 3;
    string request = 4;
    string response = 5;
    string status = 6;
}

message logResponse{
    boolean success = 1;
    string response =2;
}