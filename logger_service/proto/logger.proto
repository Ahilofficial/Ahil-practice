syntax = "proto3";

package logger;

option go_package = "./loggerpb";

service LoggerService {

    rpc SaveLog(LogRequest)
        returns (LogResponse);

}

message LogRequest {

    string service = 1;

    string method = 2;

    string endpoint = 3;

    string request = 4;

    string response = 5;

    int32 status = 6;

}

message LogResponse {

    bool success = 1;

    string message = 2;

}