syntax = "proto3";

package notification;

option go_package = "./notificationpb";

service NotificationService {
    rpc SendEmail(EmailRequest) returns (EmailResponse);
}

message EmailRequest {
    string to = 1;
    string subject = 2;
    string body = 3;
}

message EmailResponse {
    bool success = 1;
    string message = 2;
}
